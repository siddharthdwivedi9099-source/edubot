services:
  - type: web
    name: edubot-api
    runtime: docker
    rootDir: backend
    plan: free
    region: singapore
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_EMBED_MODEL
        value: text-embedding-3-small
      - key: ERP_DB_URL
        value: sqlite+aiosqlite:///./app/data/demo_school.db
      - key: ERP_READ_ONLY
        value: "true"
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: APP_SECRET_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  - type: web
    name: edubot-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
