# EduBot frontend nginx — SPA + reverse proxy to backend.
# In docker-compose the upstream resolves via the service name `backend`.

server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Gzip text assets
    gzip            on;
    gzip_min_length 256;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;

    # Static cache for hashed asset bundles (Vite emits content-hashed names)
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # SPA fallback — anything not a file goes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy API calls to the backend service.
    # Strip the /api prefix to match FastAPI routes.
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE / long-poll friendly
        proxy_buffering    off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
